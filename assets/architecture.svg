<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1000" font-family="ui-sans-serif, system-ui, -apple-system, &quot;Segoe UI&quot;, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>

    <clipPath id="clip-app"><rect x="260" y="140" width="720" height="560" rx="14"/></clipPath>
    <clipPath id="clip-platform"><rect x="260" y="735" width="720" height="220" rx="14"/></clipPath>
    <clipPath id="clip-ai"><rect x="1020" y="140" width="360" height="260" rx="14"/></clipPath>
    <clipPath id="clip-data"><rect x="1020" y="420" width="360" height="170" rx="14"/></clipPath>
    <clipPath id="clip-chan"><rect x="1020" y="610" width="360" height="200" rx="14"/></clipPath>
  </defs>

  <!-- Title -->
  <text x="720" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">UnifiedIQ — Architecture</text>
  <text x="720" y="68" text-anchor="middle" font-size="13" fill="#64748b">Single Databricks App · FastAPI + Next.js static SPA · Conversational BI · Always-on alerts · Pinnable dashboard</text>

  <!-- Background panel -->
  <rect x="20" y="90" width="1400" height="890" rx="14" fill="#f6f7fb" stroke="#e6e8f0"/>

  <!-- Column labels -->
  <text x="140" y="118" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2" fill="#64748b">USER DEVICES</text>
  <text x="620" y="118" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2" fill="#64748b">APPLICATION LAYER</text>
  <text x="1200" y="118" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2" fill="#64748b">EXTERNAL SERVICES</text>

  <!-- ============ USER DEVICES ============ -->
  <!-- Device card 1 -->
  <g>
    <rect x="60" y="140" width="160" height="220" rx="14" fill="#f5f3ff" stroke="#c4b5fd"/>
    <rect x="80" y="160" width="120" height="150" rx="6" fill="#ffffff" stroke="#ddd6fe"/>
    <rect x="92" y="178" width="80" height="6" rx="3" fill="#c7d2fe"/>
    <rect x="92" y="190" width="60" height="6" rx="3" fill="#c7d2fe" opacity="0.65"/>
    <rect x="92" y="208" width="96" height="60" rx="4" fill="#e0e7ff"/>
    <polyline points="98,260 110,250 122,255 134,242 146,248 158,238 170,244 182,232" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
    <rect x="92" y="278" width="40" height="6" rx="3" fill="#c7d2fe"/>
    <rect x="138" y="278" width="50" height="6" rx="3" fill="#c7d2fe" opacity="0.65"/>
    <text x="140" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="#312e81">User</text>
    <text x="140" y="348" text-anchor="middle" font-size="11" fill="#6d28d9">Chrome · Web</text>
  </g>

  <!-- Live-sync pill -->
  <rect x="78" y="378" width="124" height="24" rx="12" fill="#ddd6fe"/>
  <circle cx="92" cy="390" r="3" fill="#16a34a"/>
  <text x="142" y="394" text-anchor="middle" font-size="11" fill="#5b21b6">live SSE stream</text>

  <!-- ============ APPLICATION LAYER ============ -->
  <g clip-path="url(#clip-app)">
    <rect x="260" y="140" width="720" height="560" fill="#eef2ff"/>
    <rect x="260" y="140" width="720" height="76" fill="#4f46e5"/>
  </g>
  <rect x="260" y="140" width="720" height="560" rx="14" fill="none" stroke="#a5b4fc"/>
  <text x="620" y="172" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">UnifiedIQ · Conversational BI</text>
  <text x="620" y="196" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.88">Single Databricks App · FastAPI + Next.js static · same-origin /api/* · SSE streaming</text>

  <!-- Feature cards 2x3 -->
  <!-- A: Chat & Streaming -->
  <g>
    <rect x="280" y="234" width="340" height="130" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="450" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">Chat &amp; Streaming</text>
    <text x="450" y="286" text-anchor="middle" font-size="11" fill="#475569">SSE: thinking · sql · chart · data · done</text>
    <text x="450" y="304" text-anchor="middle" font-size="11" fill="#475569">Reasoning trail · generated SQL · markdown</text>
    <text x="450" y="346" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">POST /api/chat/stream</text>
  </g>
  <!-- B: Result View -->
  <g>
    <rect x="640" y="234" width="320" height="130" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="800" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">Result View</text>
    <text x="800" y="286" text-anchor="middle" font-size="11" fill="#475569">KPI · Table · Bar · Line · Area · Pie</text>
    <text x="800" y="304" text-anchor="middle" font-size="11" fill="#475569">CSV export · Pin-to-dashboard</text>
    <text x="800" y="346" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">components/chat/result-view.tsx</text>
  </g>
  <!-- C: SQL Generation -->
  <g>
    <rect x="280" y="380" width="340" height="130" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="450" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">SQL Generation</text>
    <text x="450" y="432" text-anchor="middle" font-size="11" fill="#475569">instructor MD_JSON · Pydantic schema</text>
    <text x="450" y="450" text-anchor="middle" font-size="11" fill="#475569">sqlglot validate (databricks dialect)</text>
    <text x="450" y="492" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">SQLGenerationResponse</text>
  </g>
  <!-- D: Dashboard -->
  <g>
    <rect x="640" y="380" width="320" height="130" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="800" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">Pin-to-Dashboard</text>
    <text x="800" y="432" text-anchor="middle" font-size="11" fill="#475569">Re-runs SQL on load · Rename · S/M/L</text>
    <text x="800" y="450" text-anchor="middle" font-size="11" fill="#475569">Drag reorder · axis labels · colors · filter</text>
    <text x="800" y="492" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">PATCH /api/views/{id}</text>
  </g>
  <!-- E: NL Alerts -->
  <g>
    <rect x="280" y="526" width="340" height="130" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="450" y="554" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">Natural-Language Alerts</text>
    <text x="450" y="578" text-anchor="middle" font-size="11" fill="#475569">Date/time scheduled · one-shot</text>
    <text x="450" y="596" text-anchor="middle" font-size="11" fill="#475569">Email · Slack · in-app bell</text>
    <text x="450" y="638" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">AlertService + AlertScheduler</text>
  </g>
  <!-- F: Auth -->
  <g>
    <rect x="640" y="526" width="320" height="130" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="800" y="554" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">Auth &amp; Identity</text>
    <text x="800" y="578" text-anchor="middle" font-size="11" fill="#475569">Databricks SSO · X-Forwarded-*</text>
    <text x="800" y="596" text-anchor="middle" font-size="11" fill="#475569">Okta OIDC · local AUTH_BYPASS</text>
    <text x="800" y="638" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">UserAuthService · /api/me</text>
  </g>

  <!-- App-layer / Platform connection labels -->
  <line x1="520" y1="700" x2="520" y2="735" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="722" font-size="11" fill="#64748b">serves /api + SPA</text>
  <line x1="760" y1="735" x2="760" y2="700" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="722" font-size="11" fill="#64748b">data + identity</text>

  <!-- ============ DATABRICKS PLATFORM ============ -->
  <g clip-path="url(#clip-platform)">
    <rect x="260" y="735" width="720" height="220" fill="#fff7ed"/>
    <rect x="260" y="735" width="720" height="56" fill="#ea580c"/>
  </g>
  <rect x="260" y="735" width="720" height="220" rx="14" fill="none" stroke="#fdba74"/>
  <text x="620" y="763" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Databricks Platform</text>
  <text x="620" y="782" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.88">Databricks Apps · Unity Catalog · SQL Warehouse · unifiediq secret scope</text>

  <!-- Platform sub-cards -->
  <g>
    <rect x="280" y="810" width="216" height="130" rx="10" fill="#ffffff" stroke="#fed7aa"/>
    <text x="388" y="842" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">App Runtime</text>
    <text x="388" y="868" text-anchor="middle" font-size="11" fill="#9a3412">uvicorn :$DATABRICKS_APP_PORT</text>
    <text x="388" y="886" text-anchor="middle" font-size="11" fill="#9a3412">app.yaml · secret scope</text>
    <text x="388" y="922" text-anchor="middle" font-size="10.5" font-style="italic" fill="#c2410c">aws.databricksapps.com</text>
  </g>
  <g>
    <rect x="512" y="810" width="216" height="130" rx="10" fill="#ffffff" stroke="#fed7aa"/>
    <text x="620" y="842" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">SQL Warehouse</text>
    <text x="620" y="868" text-anchor="middle" font-size="11" fill="#9a3412">databricks-sql-connector</text>
    <text x="620" y="886" text-anchor="middle" font-size="11" fill="#9a3412">auto-suspend when idle</text>
    <text x="620" y="922" text-anchor="middle" font-size="10.5" font-style="italic" fill="#c2410c">/sql/1.0/warehouses/…</text>
  </g>
  <g>
    <rect x="744" y="810" width="216" height="130" rx="10" fill="#ffffff" stroke="#fed7aa"/>
    <text x="852" y="842" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Unity Catalog</text>
    <text x="852" y="868" text-anchor="middle" font-size="11" fill="#9a3412">workspace.default</text>
    <text x="852" y="886" text-anchor="middle" font-size="11" fill="#9a3412">unifiediq_alerts · user_views</text>
    <text x="852" y="922" text-anchor="middle" font-size="10.5" font-style="italic" fill="#c2410c">Delta tables</text>
  </g>

  <!-- ============ EXTERNAL SERVICES ============ -->
  <!-- AI Providers -->
  <g clip-path="url(#clip-ai)">
    <rect x="1020" y="140" width="360" height="260" fill="#ecfdf5"/>
    <rect x="1020" y="140" width="360" height="44" fill="#059669"/>
  </g>
  <rect x="1020" y="140" width="360" height="260" rx="14" fill="none" stroke="#6ee7b7"/>
  <text x="1200" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">AI Providers · Databricks FM API</text>

  <g>
    <rect x="1040" y="198" width="320" height="44" rx="8" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="1056" y="220" font-size="13" font-weight="600" fill="#064e3b">◆ Llama 3.3 70B Instruct</text>
    <text x="1344" y="220" text-anchor="end" font-size="10.5" fill="#059669">default</text>
    <text x="1056" y="236" font-size="10.5" fill="#065f46">plain-string JSON · works with MD_JSON</text>
  </g>
  <g>
    <rect x="1040" y="248" width="320" height="44" rx="8" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="1056" y="270" font-size="13" font-weight="600" fill="#064e3b">◆ Llama 4 Maverick</text>
    <text x="1344" y="270" text-anchor="end" font-size="10.5" fill="#059669">alt</text>
    <text x="1056" y="286" font-size="10.5" fill="#065f46">also supports structured outputs</text>
  </g>
  <g>
    <rect x="1040" y="298" width="320" height="44" rx="8" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="1056" y="320" font-size="13" font-weight="600" fill="#064e3b">◆ Claude Sonnet 4 (Databricks)</text>
    <text x="1344" y="320" text-anchor="end" font-size="10.5" fill="#059669">if available</text>
    <text x="1056" y="336" font-size="10.5" fill="#065f46">when workspace has the endpoint</text>
  </g>
  <g>
    <rect x="1040" y="348" width="320" height="44" rx="8" fill="#fef2f2" stroke="#fecaca"/>
    <text x="1056" y="370" font-size="13" font-weight="600" fill="#7f1d1d">◆ GPT-OSS 120B / 20B</text>
    <text x="1344" y="370" text-anchor="end" font-size="10.5" fill="#b91c1c">avoid</text>
    <text x="1056" y="386" font-size="10.5" fill="#991b1b">reasoning parts list breaks instructor</text>
  </g>

  <!-- Data Sources -->
  <g clip-path="url(#clip-data)">
    <rect x="1020" y="420" width="360" height="170" fill="#fef3c7"/>
    <rect x="1020" y="420" width="360" height="44" fill="#b45309"/>
  </g>
  <rect x="1020" y="420" width="360" height="170" rx="14" fill="none" stroke="#fcd34d"/>
  <text x="1200" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Data Sources · Databricks SQL</text>
  <g>
    <rect x="1040" y="478" width="320" height="44" rx="8" fill="#ffffff" stroke="#fde68a"/>
    <text x="1056" y="500" font-size="13" font-weight="600" fill="#78350f">samples.nyctaxi.trips</text>
    <text x="1056" y="516" font-size="10.5" fill="#92400e">demo data · pickup_zip · fare · datetime</text>
  </g>
  <g>
    <rect x="1040" y="530" width="320" height="44" rx="8" fill="#ffffff" stroke="#fde68a"/>
    <text x="1056" y="552" font-size="13" font-weight="600" fill="#78350f">&lt;your warehouse tables&gt;</text>
    <text x="1056" y="568" font-size="10.5" fill="#92400e">read-only · grant SELECT to the app SP</text>
  </g>

  <!-- Delivery Channels -->
  <g clip-path="url(#clip-chan)">
    <rect x="1020" y="610" width="360" height="200" fill="#f1f5f9"/>
    <rect x="1020" y="610" width="360" height="44" fill="#475569"/>
  </g>
  <rect x="1020" y="610" width="360" height="200" rx="14" fill="none" stroke="#cbd5e1"/>
  <text x="1200" y="638" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Delivery Channels</text>
  <g>
    <rect x="1040" y="668" width="320" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="1056" y="688" font-size="13" font-weight="600" fill="#0f172a">Slack · chat.postMessage</text>
    <text x="1056" y="702" font-size="10.5" fill="#64748b">SLACK_BOT_TOKEN · #channel or @user</text>
  </g>
  <g>
    <rect x="1040" y="716" width="320" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="1056" y="736" font-size="13" font-weight="600" fill="#0f172a">Email · SMTP</text>
    <text x="1056" y="750" font-size="10.5" fill="#64748b">stdlib smtplib · asyncio.to_thread</text>
  </g>
  <g>
    <rect x="1040" y="764" width="320" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="1056" y="784" font-size="13" font-weight="600" fill="#0f172a">In-app bell · ring buffer</text>
    <text x="1056" y="798" font-size="10.5" fill="#64748b">always-on · auto-clears on alert delete</text>
  </g>

  <!-- ============ ARROWS ============ -->
  <!-- Device -> App Layer -->
  <line x1="220" y1="250" x2="280" y2="290" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-indigo)"/>

  <!-- SQL Generation <-> AI Providers (dashed, in/out) -->
  <line x1="620" y1="425" x2="1040" y2="270" stroke="#059669" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow-green)"/>
  <text x="820" y="338" font-size="11" font-weight="600" fill="#059669">queries</text>
  <line x1="1040" y1="320" x2="620" y2="470" stroke="#059669" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow-green)"/>
  <text x="820" y="410" font-size="11" font-weight="600" fill="#059669">responses</text>

  <!-- Data Sources -> Result View -->
  <line x1="1040" y1="500" x2="960" y2="360" stroke="#b45309" stroke-width="1.6" marker-end="url(#arrow-amber)"/>
  <text x="980" y="450" font-size="11" font-weight="600" fill="#b45309">SQL · rows</text>

  <!-- NL Alerts -> Delivery Channels -->
  <line x1="620" y1="585" x2="1040" y2="700" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="800" y="660" font-size="11" font-weight="600" fill="#475569">fire on breach</text>

  <!-- Footer hint -->
  <text x="720" y="970" text-anchor="middle" font-size="11" fill="#94a3b8">workspace.default Delta tables · unifiediq secret scope · Llama 3.3 70B default · auto-suspending SQL warehouse</text>
</svg>
